name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --all-extras --dev
      - run: uv run pytest
      - run: uvx ruff check .
      - run: uvx ruff format --check .

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - run: uvx twine check dist/*
      - run: uv run --no-project python scripts/verify_artifacts.py dist
      - name: Smoke installed wheel on Python 3.9
        run: |
          wheel=$(find dist -maxdepth 1 -name '*.whl' ! -name '._*' -print -quit)
          uv run --no-cache --isolated --no-project --python 3.9 --with "$wheel" \
            python scripts/smoke_installed.py
